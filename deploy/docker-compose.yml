
services:
  postgres_v2:
    image: postgres:16
    container_name: genesis_postgres_v2
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_V2_DB:-genesis_v2}
      - POSTGRES_USER=${POSTGRES_V2_USER:-genesis}
      - POSTGRES_PASSWORD=${POSTGRES_V2_PASSWORD:?POSTGRES_V2_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_V2_USER:-genesis} -d ${POSTGRES_V2_DB:-genesis_v2}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_v2_data:/var/lib/postgresql/data
    networks:
      - genesis_network

  django_admin:
    build:
      context: ./django_admin
      dockerfile: Dockerfile
    container_name: genesis_django_admin
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-0}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-game5.chedot.com,localhost,127.0.0.1}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@game5.chedot.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:?DJANGO_SUPERUSER_PASSWORD is required}
      - DJANGO_DB_PATH=/data/db.sqlite3
    volumes:
      - django_admin_data:/data
    networks:
      - genesis_network

  backend_v2:
    build:
      context: ../django_v2
      dockerfile: Dockerfile
    container_name: genesis_backend_v2
    restart: always
    environment:
      - DJANGO_V2_SECRET_KEY=${DJANGO_V2_SECRET_KEY:?DJANGO_V2_SECRET_KEY is required}
      - DJANGO_V2_JWT_SECRET=${DJANGO_V2_JWT_SECRET:?DJANGO_V2_JWT_SECRET is required}
      - DJANGO_V2_DEBUG=${DJANGO_V2_DEBUG:-0}
      - DJANGO_V2_ALLOWED_HOSTS=${DJANGO_V2_ALLOWED_HOSTS:-game5.chedot.com,localhost,127.0.0.1}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      - GENESIS_DEBUG=${GENESIS_DEBUG:-0}
      - POSTGRES_DB=${POSTGRES_V2_DB:-genesis_v2}
      - POSTGRES_USER=${POSTGRES_V2_USER:-genesis}
      - POSTGRES_PASSWORD=${POSTGRES_V2_PASSWORD:?POSTGRES_V2_PASSWORD is required}
      - POSTGRES_HOST=postgres_v2
      - POSTGRES_PORT=5432
    depends_on:
      postgres_v2:
        condition: service_healthy
    networks:
      - genesis_network

  backend_v2_worker:
    build:
      context: ../django_v2
      dockerfile: Dockerfile
    container_name: genesis_backend_v2_worker
    restart: always
    command: ["python", "manage.py", "generate_blocks", "--interval", "30"]
    environment:
      - DJANGO_V2_SECRET_KEY=${DJANGO_V2_SECRET_KEY:?DJANGO_V2_SECRET_KEY is required}
      - DJANGO_V2_JWT_SECRET=${DJANGO_V2_JWT_SECRET:?DJANGO_V2_JWT_SECRET is required}
      - DJANGO_V2_DEBUG=${DJANGO_V2_DEBUG:-0}
      - DJANGO_V2_ALLOWED_HOSTS=${DJANGO_V2_ALLOWED_HOSTS:-game5.chedot.com,localhost,127.0.0.1}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      - GENESIS_DEBUG=${GENESIS_DEBUG:-0}
      - POSTGRES_DB=${POSTGRES_V2_DB:-genesis_v2}
      - POSTGRES_USER=${POSTGRES_V2_USER:-genesis}
      - POSTGRES_PASSWORD=${POSTGRES_V2_PASSWORD:?POSTGRES_V2_PASSWORD is required}
      - POSTGRES_HOST=postgres_v2
      - POSTGRES_PORT=5432
    depends_on:
      postgres_v2:
        condition: service_healthy
    networks:
      - genesis_network

  frontend:
    image: nginx:alpine
    container_name: genesis_frontend
    restart: always
    ports:
      - "127.0.0.1:8085:80"
      - "127.0.0.1:8445:443"
    volumes:
      - ./frontend-web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - django_admin
      - backend_v2
      - backend_v2_worker
    networks:
      - genesis_network

volumes:
  django_admin_data:
  postgres_v2_data:

networks:
  genesis_network:
    driver: bridge
