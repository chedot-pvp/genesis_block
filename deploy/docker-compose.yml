
services:
  mongodb:
    image: mongo:7.0
    container_name: genesis_mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    networks:
      - genesis_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genesis_backend
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=genesis_block
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GENESIS_DEBUG=${GENESIS_DEBUG:-0}
      - GENESIS_CORS_ORIGINS=${GENESIS_CORS_ORIGINS:-}
      - GENESIS_ADMIN_INITIAL_PASSWORD=${GENESIS_ADMIN_INITIAL_PASSWORD:-}
    depends_on:
      - mongodb
    networks:
      - genesis_network

  frontend:
    image: nginx:alpine
    container_name: genesis_frontend
    restart: always
    ports:
      - "127.0.0.1:8085:80"
      - "127.0.0.1:8445:443"
    volumes:
      - ./frontend-web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - genesis_network

volumes:
  mongodb_data:

networks:
  genesis_network:
    driver: bridge
