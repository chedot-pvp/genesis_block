# Optional overrides for local development: expose DB/API/admin/HTTP(S) on all interfaces.
# Usage from deploy/: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  postgres_v2:
    ports:
      - "5432:5432"

  backend_v2:
    ports:
      - "8003:8003"

  django_admin:
    ports:
      - "8002:8002"

  frontend:
    ports:
      - "80:80"
      - "443:443"
