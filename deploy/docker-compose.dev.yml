# Optional overrides for local development: expose MongoDB, API, and HTTP/S on all interfaces.
# Usage from deploy/: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  mongodb:
    ports:
      - "27017:27017"

  backend:
    ports:
      - "8001:8001"

  frontend:
    ports:
      - "80:80"
      - "443:443"
